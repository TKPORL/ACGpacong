<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<title>ACG游戏姬 - 单 HTML 版(云端数据)</title>
<style>
  /* ============ iOS 原生极简液态玻璃 ============ */
  :root {
    --bg: #F2F2F7;            /* 极浅系统灰(唯一底色) */
    --card: #FFFFFF;          /* 纯白卡片 */
    --card-glass: rgba(255, 255, 255, 0.72);  /* 玻璃态(latest-bar / 切换按钮) */
    --input-bg: rgba(120, 120, 128, 0.12);    /* iOS 输入框灰底 */
    --text: #000000;          /* 纯黑 */
    --text-muted: #8E8E93;    /* 中灰(次要文字) */
    --text-soft: #C7C7CC;     /* 浅灰(占位/分隔) */
    --accent: #000000;        /* 黑色强调(主按钮) */
    --accent-text: #FFFFFF;   /* 强调上的文字 */
    --green: #34C759;         /* iOS 绿(保留给 ok 状态) */
    --yellow: #FFCC00;        /* iOS 黄 */
    --red: #FF3B30;           /* iOS 红(危险) */
    --blue: #007AFF;          /* iOS 蓝(链接) */
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.08);
    --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
    --radius-card: 20px;
    --radius-input: 14px;
    --radius-pill: 999px;
  }
  [data-theme="dark"] {
    --bg: #000000;
    --card: #1C1C1E;
    --card-glass: rgba(28, 28, 30, 0.72);
    --input-bg: rgba(120, 120, 128, 0.24);
    --text: #FFFFFF;
    --text-muted: #8E8E93;
    --text-soft: #48484A;
    --accent: #FFFFFF;
    --accent-text: #000000;
    --green: #30D158;
    --yellow: #FFD60A;
    --red: #FF453A;
    --blue: #0A84FF;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                 "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body { padding: 16px; padding-bottom: 80px; font-size: 15px; line-height: 1.5;
         transition: background 0.3s var(--ease-spring), color 0.3s var(--ease-spring); }
  .container { max-width: 960px; margin: 0 auto; }

  /* 标题行(标题居中,主题按钮右上角) */
  .header-row { position: relative; min-height: 44px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  h1 { font-size: 1.5rem; font-weight: 900; line-height: 1.2; margin: 0; color: var(--text); letter-spacing: -0.3px;
       background: none; -webkit-text-fill-color: var(--text); }
  .subtitle { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }

  /* 主题切换按钮(液态玻璃) */
  /* 最新提示条(液态玻璃) */
  .latest-bar {
    background: var(--card-glass);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 0; border-radius: var(--radius-card);
    padding: 16px 18px; margin-bottom: 14px;
    font-size: 0.9rem; line-height: 1.5;
    box-shadow: var(--shadow);
  }
  .latest-bar b { color: var(--text); font-weight: 700; }
  .latest-bar .small { color: var(--text-muted); font-size: 0.75rem; margin-top: 2px; }

  /* 面板:无边框,只靠背景差 + 极淡阴影 */
  .panel {
    background: var(--card);
    border: 0; border-radius: var(--radius-card);
    padding: 20px; margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .panel-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 14px;
    color: var(--text); letter-spacing: 0.2px; border: 0; padding: 0; }

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  label { font-size: 0.78rem; color: var(--text-muted); min-width: 56px; font-weight: 500; }

  /* 输入框:14px 圆角,无边框,系统灰底 */
  input, select, textarea {
    background: var(--input-bg); border: 0; border-radius: var(--radius-input);
    padding: 10px 14px; color: var(--text); font-size: 0.9rem;
    font-family: inherit; outline: none;
    transition: background 0.2s;
  }
  input:focus, select:focus, textarea:focus { background: rgba(120, 120, 128, 0.2); }
  [data-theme="dark"] input:focus, [data-theme="dark"] select:focus, [data-theme="dark"] textarea:focus { background: rgba(120, 120, 128, 0.32); }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  input[type="number"] { width: 80px; }
  input[type="text"] { flex: 1; min-width: 100px; }
  textarea { width: 100%; min-height: 100px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.8rem; resize: vertical; }

  /* 按钮:黑色胶囊(强调)+ 细线胶囊(次要) */
  button {
    background: var(--accent); color: var(--accent-text); border: 0;
    border-radius: var(--radius-pill);
    padding: 10px 18px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; min-height: 44px;
    font-family: inherit;
    transition: transform 0.2s var(--ease-spring), opacity 0.15s, box-shadow 0.2s, background 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.96); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button.ghost { background: transparent; color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(120, 120, 128, 0.32); }
  button.ghost:hover { background: rgba(120, 120, 128, 0.08); opacity: 1; }
  button.green { background: var(--green); color: #FFF; }
  button.yellow { background: var(--yellow); color: #000; }
  button.red { background: var(--red); color: #FFF; }

  /* Tab 容器(筛选) */
  .mode-tabs { display: flex; gap: 4px; margin-bottom: 14px; padding: 4px; background: var(--input-bg); border-radius: var(--radius-pill); flex-wrap: wrap; }
  .mode-tabs button { flex: 1; background: transparent; color: var(--text-muted);
    border: 0; border-radius: var(--radius-pill); min-width: 70px; min-height: 36px; padding: 6px 12px; }
  .mode-tabs button.active { background: var(--card); color: var(--text);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08); }
  [data-theme="dark"] .mode-tabs button.active { box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4); }

  .hidden { display: none !important; }

  /* 状态文字(扁平,无背景) */
  .status { font-size: 0.82rem; padding: 8px 14px; border-radius: var(--radius-input);
    background: var(--input-bg); color: var(--text-muted); min-height: 32px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-all; }
  .status.ok { color: var(--green); background: transparent; padding: 0; }
  .status.err { color: var(--red); background: transparent; padding: 0; }
  .status.warn { color: var(--yellow); background: transparent; padding: 0; }

  /* 日志 */
  /* 结果区 */
  .results { background: var(--card); border: 0; border-radius: var(--radius-card);
    padding: 0; max-height: 56vh; overflow-y: auto; box-shadow: var(--shadow); }
  .results table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; }
  .results th { text-align: left; color: var(--text-muted); font-weight: 600;
    font-size: 0.72rem; padding: 10px 12px; background: var(--card);
    position: sticky; top: 0; z-index: 1; letter-spacing: 0.3px;
    box-shadow: 0 1px 0 rgba(120, 120, 128, 0.12); }
  .results td { padding: 10px 12px; vertical-align: top; word-break: break-all;
    border-bottom: 1px solid rgba(120, 120, 128, 0.12); }
  .results tr:last-child td { border-bottom: 0; }
  .results tr:hover td { background: rgba(120, 120, 128, 0.06); }

  .badge { display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.3px; }
  .badge.PC { background: rgba(0, 122, 255, 0.12); color: var(--blue); }
  .badge.AZ { background: rgba(255, 59, 48, 0.12); color: var(--red); }
  .badge.OTHER { background: rgba(120, 120, 128, 0.16); color: var(--text-muted); }
  details { margin-top: 10px; }
  details summary { cursor: pointer; color: var(--blue); font-size: 0.8rem; font-weight: 500; }

  /* 进度条 */
  .help { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
  code { background: var(--input-bg); padding: 2px 6px; border-radius: 6px;
    font-size: 0.78rem; color: var(--text); font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  /* 分页 */
  .pager { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
  .pager button { padding: 8px 16px; font-size: 0.8rem; }
  .pager .pg-info { color: var(--text-muted); font-size: 0.8rem; flex: 1; text-align: center; }

  /* 入场动画(弹簧 + 错开) */
  @keyframes ios-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel, .latest-bar, .results { animation: ios-in 0.4s var(--ease-spring) both; }
  .panel:nth-of-type(1) { animation-delay: 0.04s; }
  .panel:nth-of-type(2) { animation-delay: 0.10s; }
  .panel:nth-of-type(3) { animation-delay: 0.16s; }
  .latest-bar { animation-delay: 0s; }

  @media (max-width: 600px) {
    body { padding: 12px; padding-bottom: 100px; font-size: 14px; }
    .panel { padding: 16px; }
    h1 { font-size: 1.3rem; }
    .row { gap: 8px; }
    label { min-width: 48px; font-size: 0.72rem; }
    input, select, button { font-size: 0.85rem; padding: 9px 12px; }
    .results th, .results td { padding: 8px 10px; font-size: 0.78rem; }
  }
</style>
</head>
<body data-theme="dark">
<div class="container">
  <div class="header-row">
    <h1>ACG游戏姬抓取工具</h1>
  </div>
  <div class="subtitle">单 HTML 版 · 云端数据 · 手机直接打开</div>

  <!-- 最新提示条 -->
  <div id="latest-bar" class="latest-bar hidden">
    📢 <b id="lb-date">--</b> 最新: <span id="lb-title">--</span>
    <div class="small">数据更新于 <span id="lb-time">--</span> · 共 <span id="lb-total">0</span> 条</div>
  </div>

  <!-- 数据源(已精简为只保留云端数据) -->
  <div class="panel">
    <div class="panel-title">① 数据源 · 云端</div>

    <div id="src-cloud">
      <div class="row">
        <button class="green" onclick="loadCloudData(true)">刷新数据</button>
        <span class="status" id="cloud-status" style="flex:1">就绪 · 首次进入将自动加载</span>
      </div>
    </div>
  </div>

  <!-- 筛选 / 浏览 -->
  <div class="panel">
    <div class="panel-title">② 筛选 / 浏览</div>
    <div class="mode-tabs" id="mode-tabs">
      <button class="active" data-mode="all" onclick="switchView('all')">全部</button>
      <button data-mode="single" onclick="switchView('single')">单天</button>
      <button data-mode="range" onclick="switchView('range')">多天范围</button>
      <button data-mode="pages" onclick="switchView('pages')">指定页面</button>
    </div>

    <!-- 模式参数 -->
    <div id="vp-all" class="row"><span class="status">显示全部 <b id="cnt-all">0</b> 条</span></div>

    <div id="vp-single" class="row hidden">
      <label>日期</label>
      <select id="vp-single-date"></select>
      <span class="status" style="flex:1">命中 <b id="cnt-single">0</b> 条</span>
    </div>

    <div id="vp-range" class="row hidden">
      <label>起</label>
      <select id="vp-range-from"></select>
      <label>止</label>
      <select id="vp-range-to"></select>
      <span class="status" style="flex:1">命中 <b id="cnt-range">0</b> 条</span>
    </div>

    <div id="vp-pages" class="row hidden">
      <label>每页</label>
      <input id="vp-pages-size" type="number" value="20" min="5" max="100" style="width:60px">
      <span class="status" style="flex:1">第 <b id="vp-pages-cur">1</b> 页</span>
    </div>

    <div class="pager" id="pager">
      <button class="ghost" onclick="pagePrev()">上一页</button>
      <div class="pg-info" id="pg-info">--</div>
      <button class="ghost" onclick="pageNext()">下一页</button>
    </div>
  </div>

  <!-- 结果 -->
  <div class="panel">
    <div class="panel-title">③ 结果 (<span id="result-count">0</span> 条)</div>
    <div class="row">
      <button class="green" onclick="downloadTxt()">下载 TXT</button>
      <button onclick="downloadJson()">下载 JSON</button>
      <button class="ghost" onclick="copyTxt()">复制 TXT</button>
      <button class="ghost" onclick="copyYun()">复制云盘</button>
      <button class="ghost" onclick="clearResults()">清空</button>
    </div>
    <div class="results">
      <table>
        <thead><tr><th>分类</th><th>标题</th><th>时间</th><th>链接</th></tr></thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 页脚:作者信息 -->
  <div class="footer" style="text-align:center; padding: 24px 0 12px; color: var(--text-muted); font-size: 0.78rem;">
    <div>作者:<b style="color: var(--text);">Tsinho</b></div>
    <div style="margin-top: 4px;">官网:<a href="https://link3.cc/Tsinho" target="_blank" style="color: var(--blue); text-decoration: none;">link3.cc/Tsinho</a></div>
  </div>
</div>

<script>
"use strict";

// ==================== 全局状态 ====================
let CLOUD_DATA = null;        // { generated_at, total, latest_date, latest_title, items: [] }
let CLOUD_ITEMS = [];         // = CLOUD_DATA.items 的引用(便于过滤)
let RESULTS = [];             // 用户当前看到/操作的结果(可能是过滤后)
let LAST_FILENAME = "";

let VIEW_MODE = "all";        // all / single / range / pages
let CURRENT_PAGE = 1;
let PAGE_SIZE = 20;

// JSON 数据路径(相对 index.html)
const JSON_URLS = [
  "./data/acgyx_latest.json",
  "./acgyx_latest.json",
  "../data/acgyx_latest.json",
];
// manifest + 按日期分文件路径
const MANIFEST_URLS = [
  "./data/manifest.json",
  "./manifest.json",
  "../data/manifest.json",
];
function dateFileUrls(date) {
  return [
    `./data/${date}.json`,
    `./${date}.json`,
    `../data/${date}.json`,
  ];
}

// ==================== DOM 解析 ====================
function parseHTML(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  if (doc.querySelector("parsererror")) return null;
  return doc;
}
function getDetailText(doc) {
  const c = doc.querySelector(".single-content") || doc.querySelector(".entry-content")
         || doc.querySelector("article .content") || doc.querySelector("article")
         || doc.body;
  return c ? c.textContent : doc.body.textContent;
}
function parseListHTML(html) {
  const doc = parseHTML(html); if (!doc) return [];
  const posts = [];
  doc.querySelectorAll("article").forEach(art => {
    const a = art.querySelector("h2 a, h3 a, .entry-title a, .post-title a");
    if (!a) return;
    const title = a.textContent.trim();
    const link = (a.getAttribute("href") || "").trim();
    if (!link) return;
    const catA = art.querySelector(".category .tags a, .cat, .entry-cat a");
    const category = catA ? catA.textContent.trim() : "";
    let pubTime = "";
    const authorEl = art.querySelector(".list-post-author");
    if (authorEl) {
      const m = (authorEl.textContent || "").match(/(\d{4})[-./年](\d{1,2})[-./月](\d{1,2})/);
      if (m) pubTime = `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
    }
    if (!pubTime) {
      for (const sel of ["time", ".date", ".entry-date", ".post-date", ".meta-date", ".published", "[datetime]"]) {
        const el = art.querySelector(sel);
        if (el) {
          pubTime = (el.getAttribute("datetime") || el.getAttribute("title") || el.textContent || "").trim();
          if (pubTime) break;
        }
      }
    }
    posts.push({ title, category, url: link, pub_time: pubTime });
  });
  return posts;
}
function parseDetailHTML(html) {
  const doc = parseHTML(html);
  if (!doc) return { yun_links: [], baidu_links: [], baidu_codes: [], cheat_code: "", unzip_code: "" };
  const text = getDetailText(doc);
  const yunLinks = [], bdLinks = [], bdCodes = [];
  let m;
  const reYun = /https?:\/\/yun\.139\.com[^\s)"']*/g;
  while ((m = reYun.exec(text)) !== null) {
    const link = m[0].replace(/[。,;；]+$/, "");
    if (!yunLinks.includes(link)) yunLinks.push(link);
  }
  const reBd = /https?:\/\/pan\.baidu\.com\/s\/[^\s)"']*/g;
  while ((m = reBd.exec(text)) !== null) {
    const link = m[0].replace(/[。,;；]+$/, "");
    if (!bdLinks.includes(link)) bdLinks.push(link);
  }
  const reCode = /提取码[：: ]*([a-zA-Z0-9]{2,8})/g;
  while ((m = reCode.exec(text)) !== null) {
    if (!bdCodes.includes(m[1])) bdCodes.push(m[1]);
  }
  const ccM = text.match(/作弊码[：: ]*([A-Za-z0-9]{2,16})/);
  const uzM = text.match(/汉化包解压码[：: ]*([A-Za-z0-9]{2,16})/);
  return { yun_links: yunLinks, baidu_links: bdLinks, baidu_codes: bdCodes,
           cheat_code: ccM ? ccM[1] : "", unzip_code: uzM ? uzM[1] : "" };
}

// ==================== 标题简化(移植自 Python) ====================
const CLASS_WORDS = ("SLG|RPG|ACT|AVG|RTS|TPS|FPS|MOBA|探索|冒险|动作|色情|动漫|后宫|动态|"
                    + "异种|奇幻|异世界|美少女|情色|幻想|射击|沙盒|家园|战略|休闲|卖春|援交|"
                    + "魅魔|淫魔|堕落|塔防|解谜|策略|惊悚|恐怖|校园|恋爱|科幻|魔幻|玄幻|武侠|"
                    + "历史|现代|未来|末日|都市|乡村|野外|室内|真人|3D|2D|像素|全动态|步兵|"
                    + "赞助|官中|汉化|剧情|H|经营|养成|卡牌|消除|益智|音乐|舞蹈|竞速|体育|"
                    + "格斗|搏击|拳击|摔角|摔跤|相扑|神作|新作|更新");
const CLASS_WORDS_RE = new RegExp(CLASS_WORDS);
const SUFFIX_KEYWORDS = [
  "内嵌AI汉化版", "内嵌汉化版", "内嵌版",
  "AI汉化版", "AI汉化补丁",
  "汉化版", "汉化补丁", "汉化补丁版",
  "官中步兵版", "官中赞助版", "官中版",
  "赞助版", "步兵版",
  "作弊码", "存档"
];
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function _splitNameSuffix(text) {
  if (!text) return ["", ""];
  const kws = [...SUFFIX_KEYWORDS].sort((a, b) => b.length - a.length);
  for (const kw of kws) {
    const idx = text.indexOf(kw);
    if (idx > 0) return [text.slice(0, idx).trim(), text.slice(idx).trim()];
  }
  return ["", text.trim()];
}
function _extractChineseName(text) {
  if (!text) return "";
  const parts = text.trim().split(/\s+/);
  const out = [];
  for (const p of parts) {
    if (!p) continue;
    if (/[\u3040-\u309f\u30a0-\u30ff]/.test(p)) continue;
    if (/[\u4e00-\u9fff]/.test(p)) { out.push(p); if (out.length >= 2) break; }
  }
  return out.length ? out.join(" ") : text.trim();
}
function simplifyTitle(title, category, cheatCode = "", unzipCode = "") {
  if (!title) return "";
  let t = title;
  let sizeBrackets = "", sizeMatch = null;
  for (const pat of [/\[([^\[\]]*)\]\s*$/, /\u3010([^\u3010\u3011]*)\u3011\s*$/]) {
    const m = t.match(pat);
    if (!m) continue;
    const content = m[1];
    const isClass = CLASS_WORDS_RE.test(content);
    const isSize = (/\d+\.?\d*\s*[MGK]/i.test(content)) || (content.includes("PC+"))
                || (content.trim() === "PC" || content.trim() === "安卓");
    if (isSize && !isClass) {
      sizeMatch = m; sizeBrackets = m[0];
      t = t.slice(0, m.index).trim(); break;
    }
  }
  t = t.replace(/\u3010[^\u3010\u3011]*\u3011/g, "").replace(/\[[^\[\]]*\]/g, "")
       .replace(/[（(][^)）]*[)）]/g, "").replace(/\s*v\d+[\w.]*\b/gi, " ");
  t = t.replace(/^(更新|新作|增添)(?:\s*[A-Z]+)?\s*/, "");
  for (const sym of [":", "/", "?", "?", ",", "&"]) t = t.split(sym).join(" ");
  t = t.replace(/\s+/g, " ").trim();
  let [nameRaw, suffix] = _splitNameSuffix(t);
  let name = nameRaw ? _extractChineseName(nameRaw) : "";
  if (!nameRaw) suffix = t;
  let endBracket = "";
  if (category === "PC" && sizeMatch) {
    const sizeIn = sizeMatch[1];
    const ms = sizeIn.match(/(\d+\.?\d*\s*[MGK])/i);
    endBracket = `[PC ${(ms ? ms[1] : sizeIn).trim()}]`;
  } else endBracket = sizeBrackets;
  if (cheatCode && (title || "").includes("作弊码")) {
    if (suffix.includes("作弊码")) suffix = suffix.replace("作弊码", `作弊码${cheatCode}`);
    else suffix = (suffix ? suffix + "作弊码" : "作弊码") + cheatCode;
  }
  const extras = [];
  if (unzipCode && (title || "").includes("汉化")) extras.push(`汉化包解压码${unzipCode}`);
  const mainParts = [];
  if (name && suffix) mainParts.push(`${name}-${suffix.replace(/\s+$/, "")}`);
  else if (name) mainParts.push(name);
  else if (suffix) mainParts.push(suffix.replace(/\s+$/, ""));
  if (extras.length) mainParts.push(extras.join(""));
  const main = mainParts.filter(p => p).join(" ").trim();
  if (endBracket && main) return `${main} ${endBracket}`.trim();
  if (endBracket) return endBracket.trim();
  return main || (title || "").trim();
}

// ==================== TXT 渲染 ====================
function renderTxt(rows) {
  const lines = ["Tsinho爬取工具"];
  if (!rows.length) { lines.push("(无匹配结果)"); return lines.join("\n"); }
  rows.forEach((r, i) => {
    if (i > 0) lines.push("");
    lines.push(`标题:${r.title || ""}`);
    lines.push(`分类:${r.category || ""}`);
    lines.push(`发布时间:${r.pub_time || ""}`);
    const yun = r.yun_links || [];
    if (yun.length) yun.forEach((l, idx) => lines.push(`下载链接${idx + 1}:${l}`));
    else lines.push("下载链接:(无)");
    lines.push(`原文链接:${r.url || ""}`);
  });
  return lines.join("\n");
}

// ==================== UI 辅助 ====================
function $(id) { return document.getElementById(id); }
function setCloudStatus(msg, cls = "") {
  const el = $("cloud-status");
  el.className = "status" + (cls ? " " + cls : "");
  el.textContent = msg;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function renderResults(rows) {
  rows = rows || RESULTS;
  $("result-count").textContent = rows.length;
  const tbody = $("result-tbody");
  tbody.innerHTML = "";
  rows.forEach(r => {
    const tr = document.createElement("tr");
    const cat = r.category || "?";
    const cls = (cat === "PC" || cat === "AZ") ? cat : "OTHER";
    tr.innerHTML = `
      <td><span class="badge ${cls}">${escapeHtml(cat)}</span></td>
      <td>${escapeHtml(r.title || "")}</td>
      <td>${escapeHtml(r.pub_time || "")}</td>
      <td><a href="${escapeHtml(r.url || "#")}" target="_blank" style="color:var(--accent)">打开</a></td>
    `;
    tbody.appendChild(tr);
  });
}

// ==================== 云端数据加载 ====================
async function tryFetchJSON(urls) {
  for (const url of urls) {
    try {
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) continue;
      const j = await r.json();
      if (j) return { data: j, url };
    } catch (e) { /* 试下一个 */ }
  }
  return null;
}

async function loadCloudData(manual) {
  setCloudStatus("正在加载云端数据 ...", "");

  // 1) 尝试读 manifest.json(日期索引,永久保留方案)
  const manifestRes = await tryFetchJSON(MANIFEST_URLS);
  const manifest = (manifestRes && Array.isArray(manifestRes.data)) ? manifestRes.data : [];

  // 2) 如果有 manifest,按日期分文件拉(累积所有历史)
  let historyItems = [];
  if (manifest.length) {
    const results = await Promise.all(manifest.map(async d => {
      const res = await tryFetchJSON(dateFileUrls(d));
      return (res && Array.isArray(res.data.items)) ? res.data.items : [];
    }));
    historyItems = results.flat();
  }

  // 3) 兜底:再读一次 acgyx_latest.json(主输出,兼容老版本)
  const mainRes = await tryFetchJSON(JSON_URLS);
  const mainData = (mainRes && Array.isArray(mainRes.data.items)) ? mainRes.data : null;

  // 4) 合并:历史 ∪ 最新(按 url 去重)
  const baseItems = historyItems.length ? historyItems : (mainData ? mainData.items : []);
  if (!baseItems.length && !mainData) {
    setCloudStatus("加载失败: 所有路径都打不开 JSON。" +
      "可能原因:① 没联网 ② 还没跑过 scraper ③ 文件路径不对", "err");
    return;
  }
  const seen = new Set();
  const merged = [];
  for (const it of baseItems) {
    const u = it.url || "";
    if (u && seen.has(u)) continue;
    if (u) seen.add(u);
    merged.push(it);
  }
  // 找出最新的日期 + 标题
  let latest_date = "", latest_title = "";
  for (const it of merged) {
    const pt = it.pub_time || "";
    if (pt && pt > latest_date) {
      latest_date = pt;
      latest_title = it.title || "";
    }
  }
  CLOUD_DATA = {
    generated_at: (mainData && mainData.generated_at) || new Date().toISOString(),
    total: merged.length,
    latest_date: (mainData && mainData.latest_date) || latest_date,
    latest_title: (mainData && mainData.latest_title) || latest_title,
    items: merged,
  };
  CLOUD_ITEMS = merged;
  fillLatestBar();
  fillDateSelectors();
  switchView(VIEW_MODE);
  const daysLabel = manifest.length ? ` · 历史 ${manifest.length} 天` : "";
  setCloudStatus(`已加载 ${CLOUD_ITEMS.length} 条${daysLabel} (来源: ${mainRes ? mainRes.url : "manifest 分文件"})`, "ok");
}

function fillLatestBar() {
  if (!CLOUD_DATA) return;
  const bar = $("latest-bar");
  bar.classList.remove("hidden");
  $("lb-date").textContent = CLOUD_DATA.latest_date || "--";
  $("lb-title").textContent = CLOUD_DATA.latest_title || "--";
  $("lb-total").textContent = CLOUD_DATA.total || 0;
  $("lb-time").textContent = (CLOUD_DATA.generated_at || "--").replace("T", " ").slice(0, 16);
}

function fillDateSelectors() {
  // 收集所有出现过的日期(降序,最新在前)
  const dates = Array.from(new Set(
    CLOUD_ITEMS.map(it => it.pub_time).filter(Boolean)
  )).sort().reverse();
  const opts = dates.map(d => `<option value="${d}">${d}</option>`).join("");
  $("vp-single-date").innerHTML = opts;
  $("vp-range-from").innerHTML = opts;
  $("vp-range-to").innerHTML = opts;
  if (dates.length) {
    $("vp-range-to").value = dates[0];
    $("vp-range-from").value = dates[dates.length - 1] || dates[0];
  }
}

// ==================== 筛选 / 浏览 ====================
function switchView(mode) {
  VIEW_MODE = mode;
  CURRENT_PAGE = 1;
  document.querySelectorAll("#mode-tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === mode);
  });
  ["all", "single", "range", "pages"].forEach(v => $(`vp-${v}`).classList.toggle("hidden", v !== mode));
  applyView();
}

function applyView() {
  if (!CLOUD_DATA) { renderResults([]); return; }
  let items = CLOUD_ITEMS;
  if (VIEW_MODE === "single") {
    const d = $("vp-single-date").value;
    items = items.filter(it => it.pub_time === d);
    $("cnt-single").textContent = items.length;
  } else if (VIEW_MODE === "range") {
    const from = $("vp-range-from").value;
    const to = $("vp-range-to").value;
    const lo = from <= to ? from : to;
    const hi = from <= to ? to : from;
    items = items.filter(it => it.pub_time && it.pub_time >= lo && it.pub_time <= hi);
    $("cnt-range").textContent = items.length;
  } else if (VIEW_MODE === "pages") {
    PAGE_SIZE = parseInt($("vp-pages-size").value, 10) || 20;
    PAGE_SIZE = Math.max(5, Math.min(100, PAGE_SIZE));
    $("vp-pages-cur").textContent = CURRENT_PAGE;
  }
  // 默认按时间倒序
  items = [...items].sort((a, b) => (b.pub_time || "").localeCompare(a.pub_time || ""));
  if (VIEW_MODE === "pages") {
    const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
    if (CURRENT_PAGE > totalPages) CURRENT_PAGE = totalPages;
    const start = (CURRENT_PAGE - 1) * PAGE_SIZE;
    const paged = items.slice(start, start + PAGE_SIZE);
    RESULTS = paged;
    $("pg-info").textContent = `${CURRENT_PAGE} / ${totalPages} 页 · 共 ${items.length} 条`;
  } else {
    RESULTS = items;
    $("pg-info").textContent = `共 ${items.length} 条`;
  }
  $("cnt-all").textContent = CLOUD_ITEMS.length;
  renderResults(RESULTS);
}
function pagePrev() { if (CURRENT_PAGE > 1) { CURRENT_PAGE--; applyView(); } }
function pageNext() { CURRENT_PAGE++; applyView(); }


// ==================== 导出 ====================
function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}
function downloadTxt() {
  if (!RESULTS.length) { alert("没有结果可下载"); return; }
  downloadBlob(renderTxt(RESULTS),
    `acgyx_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.txt`,
    "text/plain;charset=utf-8");
}
function downloadJson() {
  if (!RESULTS.length) { alert("没有结果可下载"); return; }
  downloadBlob(JSON.stringify(RESULTS, null, 2),
    `acgyx_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.json`,
    "application/json;charset=utf-8");
}
function copyTxt() {
  if (!RESULTS.length) { alert("没有结果"); return; }
  navigator.clipboard.writeText(renderTxt(RESULTS))
    .then(() => alert("已复制 TXT"), () => alert("复制失败,请用下载"));
}
function copyYun() {
  if (!RESULTS.length) { alert("没有结果"); return; }
  const lines = [];
  RESULTS.forEach(r => {
    (r.yun_links || []).forEach(l => {
      const code = (r.baidu_codes && r.baidu_codes[0]) || "";
      lines.push(`${r.title}\t${l}\t${code}`);
    });
  });
  if (!lines.length) { alert("当前结果中没有云盘链接"); return; }
  navigator.clipboard.writeText(lines.join("\n"))
    .then(() => alert(`已复制 ${lines.length} 条云盘链接`), () => alert("复制失败"));
}
function clearResults() {
  if (!confirm("确认清空当前结果?")) return;
  RESULTS = []; renderResults();
}

// ==================== 事件绑定 ====================
$("vp-single-date").addEventListener("change", applyView);
$("vp-range-from").addEventListener("change", applyView);
$("vp-range-to").addEventListener("change", applyView);
$("vp-pages-size").addEventListener("change", () => { CURRENT_PAGE = 1; applyView(); });

// ==================== 启动 ====================
setCloudStatus("就绪 · 首次进入将自动加载", "");
loadCloudData(false);
</script>
